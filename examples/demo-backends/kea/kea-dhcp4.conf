{
  // ISC Kea 3.0 DHCPv4 for the IPForge demo. host_cmds (open source in 3.0) +
  // a Postgres host backend let IPForge add/remove reservations at runtime.
  // subnet id 1 matches the README proof command.
  "Dhcp4": {
    "interfaces-config": { "interfaces": [ "*" ] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/var/run/kea/kea4-ctrl-socket"
    },
    "lease-database": { "type": "memfile", "lfc-interval": 3600 },
    "hosts-database": {
      "type": "postgresql",
      "name": "kea",
      "user": "kea",
      "password": "kea",
      "host": "kea-db"
    },
    "hooks-libraries": [
      // Kea 3.0 only allows the real arch hooks dir (not a symlink). The kea
      // service pins platform linux/amd64 so this x86_64 path is always right.
      // libdhcp_pgsql enables the postgresql host backend (a hook in 3.0);
      // libdhcp_host_cmds provides reservation-add/-del. Load pgsql first.
      { "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_pgsql.so" },
      { "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_host_cmds.so" }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.99.0.0/24",
        "comment": "Pool spans the whole usable subnet so IPForge's scope match (by pool range) resolves any allocated IP — demo convenience.",
        "pools": [ { "pool": "10.99.0.1 - 10.99.0.254" } ]
      }
    ],
    "loggers": [
      { "name": "kea-dhcp4", "severity": "INFO",
        "output_options": [ { "output": "stdout" } ] }
    ]
  }
}
