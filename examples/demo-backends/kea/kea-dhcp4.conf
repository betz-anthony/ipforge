{
  // ISC Kea DHCPv4 for the IPForge demo. subnet id 1 matches README's proof
  // command. This FREE config starts without host_cmds so IPForge can read
  // scopes + leases. Reservation PUSH (reservation-add) needs the premium
  // host_cmds hook — see the commented block below + the Dockerfile note.
  "Dhcp4": {
    "interfaces-config": { "interfaces": [ "*" ] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/tmp/kea4-ctrl-socket"
    },
    "lease-database": { "type": "memfile", "lfc-interval": 3600 },

    // ── ISC SUBSCRIBERS ONLY: uncomment to enable reservation-add/-del ──
    // Requires libdhcp_host_cmds.so (premium) present in the image, plus the
    // Postgres host backend (the kea-db service + `kea-admin db-init pgsql`).
    // "hosts-database": {
    //   "type": "postgresql", "name": "kea", "user": "kea",
    //   "password": "kea", "host": "kea-db"
    // },
    // "hooks-libraries": [
    //   { "library": "/usr/lib/kea/hooks/libdhcp_host_cmds.so" }
    // ],

    "subnet4": [
      {
        "id": 1,
        "subnet": "10.99.0.0/24",
        "pools": [ { "pool": "10.99.0.100 - 10.99.0.150" } ]
      }
    ],
    "loggers": [
      { "name": "kea-dhcp4", "severity": "INFO",
        "output_options": [ { "output": "stdout" } ] }
    ]
  }
}
