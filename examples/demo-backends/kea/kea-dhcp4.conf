{
  // ISC Kea 3.0 DHCPv4 for the IPForge demo. host_cmds (open source in 3.0) +
  // a Postgres host backend let IPForge add/remove reservations at runtime.
  // subnet id 1 matches the README proof command.
  "Dhcp4": {
    "interfaces-config": { "interfaces": [ "*" ] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/var/run/kea/kea4-ctrl-socket"
    },
    "lease-database": { "type": "memfile", "lfc-interval": 3600 },
    "hosts-database": {
      "type": "postgresql",
      "name": "kea",
      "user": "kea",
      "password": "kea",
      "host": "kea-db"
    },
    "hooks-libraries": [
      // Kea 3.0 requires the real arch hooks dir (not a symlink), which differs
      // by CPU (x86_64-linux-gnu vs aarch64-linux-gnu). The kea entrypoint
      // detects it at runtime and substitutes __HOOKS_DIR__ here, so this works
      // native on amd64 AND arm64 (no platform pin / emulation needed).
      // libdhcp_pgsql enables the postgresql host backend (a hook in 3.0);
      // libdhcp_host_cmds provides reservation-add/-del. Load pgsql first.
      { "library": "__HOOKS_DIR__/libdhcp_pgsql.so" },
      { "library": "__HOOKS_DIR__/libdhcp_host_cmds.so" }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.99.0.0/24",
        "pools": [ { "pool": "10.99.0.100 - 10.99.0.150" } ]
      }
    ],
    "loggers": [
      { "name": "kea-dhcp4", "severity": "INFO",
        "output_options": [ { "output": "stdout" } ] }
    ]
  }
}
