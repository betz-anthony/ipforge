{
  // ISC Kea DHCPv4 for the IPForge demo. Reservations are added at runtime by
  // IPForge via the `host_cmds` hook (reservation-add) into the Postgres host
  // backend. subnet id 1 matches the proof command in README.md.
  // VERIFY: the hook path below must exist in your Kea image.
  "Dhcp4": {
    "interfaces-config": { "interfaces": [ "*" ] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/tmp/kea4-ctrl-socket"
    },
    "lease-database": { "type": "memfile", "lfc-interval": 3600 },
    "hosts-database": {
      "type": "postgresql",
      "name": "kea",
      "user": "kea",
      "password": "kea",
      "host": "kea-db"
    },
    "hooks-libraries": [
      { "library": "/usr/lib/kea/hooks/libdhcp_host_cmds.so" }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.99.0.0/24",
        "pools": [ { "pool": "10.99.0.100 - 10.99.0.150" } ]
      }
    ],
    "loggers": [
      { "name": "kea-dhcp4", "severity": "INFO",
        "output_options": [ { "output": "stdout" } ] }
    ]
  }
}
