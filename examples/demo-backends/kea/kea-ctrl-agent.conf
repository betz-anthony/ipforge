{
  // Kea Control Agent — exposes the HTTP command API IPForge's keadhcp provider
  // posts to (http://kea:8000), forwarding to kea-dhcp4 over the shared unix
  // control socket. No auth here (demo); set `secret` blank in the IPForge
  // provider config. VERIFY: in Kea 2.7+ the ctrl-agent is being superseded by
  // the daemon's built-in HTTP — adjust if your image differs.
  "Control-agent": {
    "http-host": "0.0.0.0",
    "http-port": 8000,
    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/tmp/kea4-ctrl-socket"
      }
    },
    "loggers": [
      { "name": "kea-ctrl-agent", "severity": "INFO",
        "output_options": [ { "output": "stdout" } ] }
    ]
  }
}
