# Disposable, REAL DNS/DHCP backends for the IPForge demo/screencast.
# Run alongside the main stack so IPForge's providers push to them for real:
#
#   docker compose -f docker-compose.yml \
#     -f examples/demo-backends/docker-compose.demo-backends.yml up -d
#
# Services join the main compose's default network, so the `api` container
# reaches them by name: bind9:53, kea:8000, pihole:80.
# See README.md for the IPForge provider settings + on-camera proof commands.
#
# THROWAWAY ONLY — committed demo creds. `down -v` wipes all state.

services:
  # ── DNS: BIND9, authoritative for demo.lab, TSIG-signed RFC2136 + AXFR ──
  bind9:
    image: internetsystemsconsortium/bind9:9.20
    container_name: ipforge-demo-bind9
    # Seed the zone into the writable volume, then run named. Config stays ro so
    # the committed seed file is never mutated; named writes zone+journal to the
    # volume (wiped by `down -v`, so the demo always starts from an empty zone).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "cp -n /etc/bind/db.demo.lab /var/lib/bind/db.demo.lab;
         chmod -R 0777 /var/lib/bind;
         exec named -g -c /etc/bind/named.conf"
    volumes:
      - ./bind:/etc/bind:ro
      - bind_data:/var/lib/bind
    ports:
      # 5353 is taken by macOS mDNS (Bonjour); use a high host port.
      - "15353:53/udp"  # query from your laptop: dig @127.0.0.1 -p 15353
      - "15353:53/tcp"

  # ── DHCP: ISC Kea (control agent API). Needs host_cmds hook (see README C). ──
  kea-db:
    image: postgres:16-alpine
    container_name: ipforge-demo-kea-db
    environment:
      POSTGRES_DB: kea
      POSTGRES_USER: kea
      POSTGRES_PASSWORD: kea
    volumes:
      - kea_db:/var/lib/postgresql/data

  kea:
    # Built from ./kea/Dockerfile, which installs Kea 2.7+ (open-source hooks)
    # and FAILS THE BUILD if libdhcp_host_cmds.so is missing — so the hook
    # reservation-add needs is guaranteed present. Runs dhcp4 + ctrl-agent.
    build: ./kea
    platform: linux/amd64   # stable hooks path (/usr/lib/x86_64-linux-gnu/...)
    container_name: ipforge-demo-kea
    depends_on: [kea-db]
    # Init the Postgres host schema (idempotent), then run dhcp4 (with the
    # host_cmds hook) + the control agent. Kea 3.0 hooks are open source.
    command: >
      sh -c "mkdir -p /run/kea /var/lib/kea;
             PGPASSWORD=kea kea-admin db-init pgsql -u kea -p kea -n kea -h kea-db 2>/dev/null || true;
             kea-dhcp4 -c /etc/kea/kea-dhcp4.conf &
             exec kea-ctrl-agent -c /etc/kea/kea-ctrl-agent.conf"
    volumes:
      - ./kea:/etc/kea:ro
    # ctrl-agent listens on 8000; reachable from api as http://kea:8000
    ports:
      - "18000:8000"     # prove from your laptop: curl http://127.0.0.1:8000

  # ── All-in-one alternative: Pi-hole (DNS + DHCP via one HTTP API) ──
  pihole:
    image: pihole/pihole:latest
    container_name: ipforge-demo-pihole
    environment:
      FTLCONF_webserver_api_password: "demodemo"
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_dns_upstreams: "1.1.1.1"
    ports:
      - "8081:80"       # admin UI: http://localhost:8081/admin
      - "15354:53/udp"  # dig @127.0.0.1 -p 15354
    cap_add:
      - NET_ADMIN       # required for Pi-hole's DHCP server

volumes:
  kea_db:
  bind_data:
