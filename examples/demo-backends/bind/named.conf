// BIND9 config for the IPForge demo backend.
// Authoritative for demo.lab; accepts TSIG-signed dynamic updates (RFC2136,
// what IPForge's `bind` provider sends) and zone transfers (AXFR, how it reads).
// THROWAWAY KEY — never reuse.

key "ipforge-key" {
    algorithm hmac-sha256;
    secret "MTIzNDU2Nzg5MGFiY2RlZmdoaWprbG1ub3BxcnN0dXY="; // gitleaks:allow demo throwaway key
};

options {
    directory "/etc/bind";
    listen-on { any; };
    listen-on-v6 { any; };
    allow-query { any; };
    recursion no;
    dnssec-validation no;
    pid-file "/var/run/named/named.pid";
};

zone "demo.lab" {
    type master;
    file "/etc/bind/db.demo.lab";
    allow-transfer { key "ipforge-key"; };
    allow-update   { key "ipforge-key"; };
};
