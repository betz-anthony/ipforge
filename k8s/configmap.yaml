apiVersion: v1
kind: ConfigMap
metadata:
  name: ipforge-config
  namespace: ipforge
data:
  # Provider selection only. Hostnames, usernames, URLs, and credentials
  # for the selected providers live in the ipforge-secret Secret
  # (see k8s/secret.example.yaml).
  DNS_PROVIDER: "msdns"      # comma-separated: msdns,pihole,bind
  DHCP_PROVIDER: "msdhcp"    # comma-separated: msdhcp,keadhcp
  MS_WINRM_TRANSPORT: "ntlm" # non-sensitive WinRM auth scheme: ntlm|kerberos|basic
  MS_WINRM_PORT: "5985"      # non-sensitive default WinRM port
  BIND_PORT: "53"
  BIND_TSIG_ALGORITHM: "hmac-sha256"
  BIND_ZONES: ""
  SYNC_MODE: "disabled"      # CronJob handles sync in K8s
