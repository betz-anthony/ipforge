apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All IPForge manifests, applied as one unit with `kubectl apply -k k8s/`.
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres/pvc.yaml
  - postgres/service.yaml
  - postgres/statefulset.yaml
  - api/service.yaml
  - api/deployment.yaml
  - web/service.yaml
  - web/deployment.yaml
  - ingress.yaml
  - sync-cronjob.yaml

# Placeholder registry/tag. The CI deploy job overrides both before apply:
#   kustomize edit set image ipam-api=$CI_REGISTRY_IMAGE/api:$SHA \
#                            ipam-web=$CI_REGISTRY_IMAGE/web:$SHA
images:
  - name: ipam-api
    newName: ghcr.io/betz-anthony/ipforge/api
    newTag: latest
  - name: ipam-web
    newName: ghcr.io/betz-anthony/ipforge/web
    newTag: latest
