# DO NOT commit real values. Use Sealed Secrets, ESO, or inject via CI.
# Values must be base64-encoded: echo -n 'value' | base64
#
# Registry pull secret (gitlab-registry) is NOT defined here — it holds a token.
# Create it out-of-band with a GitLab project deploy token (read_registry scope):
#   kubectl create secret docker-registry gitlab-registry -n ipforge \
#     --docker-server=$CI_REGISTRY \
#     --docker-username=<deploy-token-username> \
#     --docker-password=<deploy-token>
apiVersion: v1
kind: Secret
metadata:
  name: ipforge-secret
  namespace: ipforge
type: Opaque
data:
  DB_PASSWORD: aXBhbQ==          # "ipam" — change before deploying
  JWT_SECRET_KEY: ""             # leave empty to auto-generate; set for multi-replica API
  SECRET_KEY: ""                 # Fernet key for at-rest credential encryption. Generate:
                                 #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
                                 # Apply out-of-band: kubectl patch secret ipforge-secret -n ipforge \
                                 #   --type=merge -p '{"stringData":{"SECRET_KEY":"<value>"}}'
  MS_WINRM_PASSWORD: ""
  PIHOLE_PASSWORD: ""
  BIND_TSIG_KEY_SECRET: ""
  KEA_SECRET: ""
# Hostnames + service account usernames are treated as sensitive here
# (infra topology disclosure). Use stringData for human-readable values;
# kubectl will base64-encode them on apply.
stringData:
  MS_WINRM_HOST: ""              # e.g. dc01.corp.example.com
  MS_WINRM_USER: ""              # e.g. CORP\svc-ipam
  MS_DNS_SERVER: ""              # hostname or IP of DNS server
  MS_DHCP_SERVER: ""             # hostname or IP of DHCP server
  PIHOLE_URL: ""
  BIND_HOST: ""
  BIND_TSIG_KEY_NAME: ""
  KEA_URL: ""
