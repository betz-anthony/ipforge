# Requires an Ingress controller (nginx-ingress, Traefik, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipam
  namespace: ipam
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # cert-manager.io/cluster-issuer: letsencrypt-prod  # uncomment for TLS
spec:
  # tls:                                                 # uncomment for TLS
  #   - hosts: [ipam.example.com]
  #     secretName: ipam-tls
  rules:
    - host: ipforge.example.com  # replace with your hostname
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
