# Requires an Ingress controller (nginx-ingress, Traefik, etc.)
# TLS via wildcard *.example.com cert in ingress-nginx namespace,
# auto-reflected here by emberstack/kubernetes-reflector.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipforge
  namespace: ipforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [ipforge.example.com]
      secretName: wildcard-tls
  rules:
    - host: ipforge.example.com  # replace with your hostname
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
