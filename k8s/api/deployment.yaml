apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ipforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      initContainers:
        - name: migrate
          image: ipam-api  # registry + tag pinned by kustomization.yaml / CI
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ipforge-secret
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://ipam:$(DB_PASSWORD)@postgres:5432/ipam
          envFrom:
            - configMapRef:
                name: ipforge-config
            - secretRef:
                name: ipforge-secret
      containers:
        - name: api
          image: ipam-api  # registry + tag pinned by kustomization.yaml / CI
          ports:
            - containerPort: 8000
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ipforge-secret
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://ipam:$(DB_PASSWORD)@postgres:5432/ipam
          envFrom:
            - configMapRef:
                name: ipforge-config
            - secretRef:
                name: ipforge-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
