services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipam
      POSTGRES_USER: ipam
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ipam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipam"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://ipam:${DB_PASSWORD:-ipam}@db:5432/ipam
      MS_WINRM_HOST: ${MS_WINRM_HOST:-}
      MS_WINRM_USER: ${MS_WINRM_USER:-}
      MS_WINRM_PASSWORD: ${MS_WINRM_PASSWORD:-}
      MS_WINRM_TRANSPORT: ${MS_WINRM_TRANSPORT:-ntlm}
      MS_DNS_SERVER: ${MS_DNS_SERVER:-}
      MS_DHCP_SERVER: ${MS_DHCP_SERVER:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  web:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
