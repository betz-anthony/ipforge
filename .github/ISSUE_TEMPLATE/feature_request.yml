name: ✨ Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like IPForge to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Provider, scale, deployment, or anything else that helps.
