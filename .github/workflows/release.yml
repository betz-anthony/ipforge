# Create a GitHub Release when a v* tag appears (the public mirror pushes tags;
# tag pushes via the deploy key trigger this). Release notes are pulled from the
# matching section of CHANGELOG.md.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/extract-changelog.sh "$VERSION" > release-notes.md
          echo "----- notes -----"; cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: IPForge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
