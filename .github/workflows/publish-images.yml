# Build and publish the IPForge api + web images to GitHub Container Registry.
#
# This file lives in the upstream repo and is carried to the public GitHub
# mirror unchanged (it is not in .github-mirror-exclude). It only runs on
# GitHub Actions, where it makes `docker compose up` and `kubectl apply -k k8s/`
# work for the public without a local build.
#
# Image names match what the public kustomization references after the mirror's
# registry rewrite: ghcr.io/<owner>/<repo>/api and .../web.
#
# The mirror force-pushes only the default branch (no tags), so the push trigger
# below is what keeps GHCR current. The tag trigger is here for releases cut
# directly on GitHub.
name: Publish images

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile.prod
          - name: web
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
